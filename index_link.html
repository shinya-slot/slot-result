
        <!DOCTYPE html>
        <html lang="ja">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LINK</title>
        
        <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            padding: 16px;
            margin: 0;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        h1 {
        font-size: 28px;
        }
        h2 {
        font-size: 24px;
        }
        .predict-date{
            font-size:18px;
            font-weight:bold;
            margin-bottom:18px;
            color:#444;
        }
        .menu-button {
        display: block;
        background: #333;
        color: white;
        text-decoration: none;
        text-align: center;
        padding: 18px;
        margin: 16px 0;
        border-radius: 12px;
        font-size: 24px;
        font-weight: bold;
        }
        .link-row{
            margin-top:10px;
            line-height:1.4;
        }

        .link-rate{
            color:#1565ff;
            font-weight:bold;
            margin-left:20px;
        }
        .back {
        display: block;
        margin-bottom: 16px;
        color: #333;
        font-size: 18px;
        }

        .machine_rank_list{
            font-size:14px;
            line-height:1.8;
            margin-bottom:15px;
        }
        .rank_top3{
            color:#d00000;
            font-weight:bold;
        }

        .total-card{
            background:white;
            border-radius:12px;
            padding:14px;
            margin:12px 0;
            box-shadow:0 2px 8px rgba(0,0,0,0.12);
        }

        .total-rank{
            font-size:22px;
            font-weight:bold;
        }

        .total-main{
            font-size:28px;
            font-weight:bold;
            margin-top:4px;
        }

        .total-main span{
            font-size:18px;
        }

        .total-score{
            font-size:22px;
            font-weight:bold;
            color:#d60000;
            margin-top:6px;
        }

        .total-sub{
            font-size:18px;
            margin-top:4px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 14px;
            margin: 14px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            box-sizing: border-box;
            width: 100%;
            max-width: 100%;
        }
        .rank {
        font-size: 26px;
        font-weight: bold;
        }
        .score {
        color: #d00000;
        font-weight: bold;
        }
        .prev-top3-box {
            background: #fff8dc;
            border-left: 5px solid orange;
            padding: 4px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 14px;
        }

        .card {
            width: 100%;
            max-width: none;
            box-sizing: border-box;
            display: block;
            clear: both;
            float: none;
        }

        @media screen and (max-width: 600px) {
            body {
                padding: 10px;
                overflow-x: hidden;
            }

            .card {
                width: 100%;
                max-width: 100%;
                margin: 12px 0;
                padding: 14px;
                box-sizing: border-box;
            }

            .link-line {
                white-space: normal;
                word-break: keep-all;
            }
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body > div,
        .section {
            display: block;
            width: 100%;
            max-width: 100%;
            clear: both;
        }

        .card {
            display: block !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 12px 0 !important;
            float: none !important;
            clear: both !important;
        }

        .card .card {
            margin-left: 0 !important;
            margin-right: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
        }

        .section > .card {
            margin-left: 0 !important;
            width: 100% !important;
        }
        
        .revival-box{
            margin-top:8px;
            margin-bottom:8px;
        }

        .revival-title{
            font-size:22px;
            font-weight:bold;
            margin-bottom:4px;
        }

        .revival-number{
            font-size:18px;
            color:#0066ff;
            font-weight:bold;
        }

        .trap-box{
            margin-top:8px;
            margin-bottom:8px;
        }

        .trap-title{
            font-size:22px;
            font-weight:bold;
            margin-bottom:4px;
        }

        .trap-number{
            font-size:18px;
            color:#0066ff;
            font-weight:bold;
        }

        .revival-title,
        .trap-title{
            font-size:20px;
            font-weight:bold;
            margin-top:10px;
            margin-bottom:4px;
        }

        .revival-number,
        .trap-number{
            font-size:18px;
            color:#0066ff;
            font-weight:bold;
            margin-bottom:10px;
        }

        .detect-text{
            color:#0066ff;
            font-weight:bold;
        }

        </style>
        
        </head>
